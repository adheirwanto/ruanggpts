<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUANG GPTs by Dhe_irwans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <style>
        .modern-grid {
            background-color: #f8fafc;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body class="modern-grid text-slate-800 font-sans antialiased">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-40 top-0 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-start">
            <img src="1783484743683.png" alt="Ruang GPTs" class="h-10 md:h-12 object-contain">
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="min-h-screen pt-28 pb-12 flex flex-col items-center justify-center px-4">
        
        <div class="w-full max-w-sm flex flex-col items-center">
            
            <!-- Login Card -->
            <div id="loginConsole" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-100 p-8 transition-all duration-300">
                
                <h1 class="text-xl font-bold text-slate-800 mb-2">Selamat Datang</h1>
                <p class="text-sm text-slate-500 mb-6">Masukkan email terdaftar untuk akses materi.</p>
                
                <div class="space-y-4">
                    <input type="email" id="inputEmail" placeholder="nama@email.com" 
                           autocapitalize="none" autocorrect="off" spellcheck="false"
                           oninput="handleEmailInput(this)" onfocus="handleInputFocus()"
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all">
                    
                    <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3.5 rounded-xl text-sm transition-colors shadow-sm">
                        Akses Member Area
                    </button>
                    
                    <div id="errorMessage" class="hidden bg-red-50 text-red-600 border border-red-100 rounded-xl py-3 px-4 text-sm font-medium text-center"></div>
                </div>
            </div>

            <!-- Footer -->
            <p class="text-xs text-slate-400 mt-8 font-medium">
                &copy; 2026 Ruang GPTs. By Dhe_irwans
            </p>
        </div>
    </main>

    <script>
        const EMAIL_DB_URL = "https://raw.githubusercontent.com/adheirwanto/members.json/refs/heads/main/members.json";
        const GOOGLE_DOCS_URL = "https://docs.google.com/document/d/1hMjTH7fr2Q6uhxh9mPBlWhcECNqajvaa7dgtBUZH3GU/edit?usp=drivesdk";

        function handleEmailInput(e) { e.value = e.value.toLowerCase(); }
        function handleInputFocus() {
            setTimeout(() => { document.getElementById('loginConsole').scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }

        async function prosesLogin() {
            const emailInput = document.getElementById('inputEmail').value.trim().toLowerCase();
            const errMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('btnLogin');

            if (!emailInput) { showError("Silakan masukkan email Anda."); return; }

            btn.innerText = "Memeriksa...";
            btn.disabled = true;
            errMsg.classList.add('hidden');

            try {
                const response = await fetch(EMAIL_DB_URL);
                const emailBerlisensi = await response.json();
                
                if (emailBerlisensi.map(e => e.trim().toLowerCase()).includes(emailInput)) {
                    btn.innerText = "Berhasil! Mengalihkan...";
                    btn.className = "w-full bg-emerald-500 text-white font-semibold py-3.5 rounded-xl text-sm";
                    setTimeout(() => { window.location.href = GOOGLE_DOCS_URL; }, 800);
                } else {
                    showError("Akses ditolak: Email tidak terdaftar.");
                    resetButton(btn);
                }
            } catch (e) {
                showError("Gagal terhubung ke database.");
                resetButton(btn);
            }
        }

        function showError(msg) {
            const errMsg = document.getElementById('errorMessage');
            errMsg.innerText = msg;
            errMsg.classList.remove('hidden');
        }

        function resetButton(btn) {
            btn.innerText = "Akses Member Area";
            btn.disabled = false;
            btn.className = "w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3.5 rounded-xl text-sm transition-colors shadow-sm";
        }
    </script>
</body>
</html>
