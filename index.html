<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUANG GPTs by Dhe_irwans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-brand-500 selection:text-white">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-40 top-0 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-center">
            <img src="1000399418.png" alt="Ruang GPTs" class="h-8 md:h-10 object-contain opacity-90">
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="min-h-screen pt-24 pb-12 flex flex-col items-center justify-center px-4">
        <div class="w-full max-w-md flex flex-col items-center text-center">
            
            <!-- Logo / Image Illustration -->
            <div class="mb-8 p-4 bg-white rounded-3xl shadow-sm border border-slate-100">
                <img src="1000400317.png" alt="Ruang GPTs 3D" class="w-40 h-40 md:w-48 md:h-48 object-contain">
            </div>
            
            <!-- Login Card -->
            <div id="loginConsole" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 transition-all duration-300">
                
                <h1 class="text-xl font-bold text-slate-800 mb-2">Selamat Datang</h1>
                <p class="text-sm text-slate-500 mb-6">Masukkan email yang terdaftar untuk mengakses materi.</p>
                
                <div class="space-y-4">
                    <div>
                        <input type="email" id="inputEmail" placeholder="nama@email.com" 
                               autocapitalize="none" autocorrect="off" spellcheck="false"
                               oninput="handleEmailInput(this)" onfocus="handleInputFocus()"
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all placeholder-slate-400">
                    </div>
                    
                    <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3.5 px-4 rounded-xl text-sm transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">
                        Akses Member Area
                    </button>
                    
                    <div id="errorMessage" class="hidden bg-red-50 text-red-600 border border-red-100 rounded-xl py-3 px-4 text-sm font-medium text-center transition-all">
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <p class="text-xs text-slate-400 mt-8 font-medium">
                &copy; 2026 Ruang GPTs. By Dhe_irwans
            </p>
        </div>
    </main>

    <!-- DATABASE CONFIGURATION SCRIPT -->
    <script>
        const EMAIL_DB_URL = "https://raw.githubusercontent.com/adheirwanto/members.json/refs/heads/main/members.json";
        const GOOGLE_DOCS_URL = "https://docs.google.com/document/d/1hMjTH7fr2Q6uhxh9mPBlWhcECNqajvaa7dgtBUZH3GU/edit?usp=drivesdk";

        function handleEmailInput(element) { 
            element.value = element.value.toLowerCase(); 
        }
        
        function handleInputFocus() {
            setTimeout(() => { 
                document.getElementById('loginConsole').scrollIntoView({ behavior: 'smooth', block: 'center' }); 
            }, 300);
        }

        async function prosesLogin() {
            const emailInput = document.getElementById('inputEmail').value.trim().toLowerCase();
            const errMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('btnLogin');

            if (!emailInput) {
                showError("Silakan masukkan email Anda.");
                return;
            }

            // Loading state
            btn.innerText = "Memeriksa data...";
            btn.disabled = true;
            btn.className = "w-full bg-slate-400 text-white font-semibold py-3.5 px-4 rounded-xl text-sm transition-colors duration-200 cursor-not-allowed";
            errMsg.classList.add('hidden');

            try {
                const response = await fetch(EMAIL_DB_URL);
                if (!response.ok) throw new Error();
                const emailBerlisensi = await response.json();
                const cleanEmails = emailBerlisensi.map(email => email.trim().toLowerCase());

                if (Array.isArray(cleanEmails) && cleanEmails.includes(emailInput)) {
                    // Success state
                    btn.innerText = "Akses Diberikan! Mengalihkan...";
                    btn.className = "w-full bg-emerald-500 text-white font-semibold py-3.5 px-4 rounded-xl text-sm shadow-md transition-all";
                    
                    setTimeout(() => {
                        window.location.href = GOOGLE_DOCS_URL;
                    }, 800);
                } else {
                    // Fail state
                    showError("Akses ditolak: Email tidak terdaftar.");
                    handleInputFocus();
                    resetButton(btn);
                }
            } catch (e) {
                // Error state
                showError("Terjadi kesalahan sistem. Coba lagi nanti.");
                resetButton(btn);
            }
        }

        function showError(message) {
            const errMsg = document.getElementById('errorMessage');
            errMsg.innerText = message;
            errMsg.classList.remove('hidden');
        }

        function resetButton(btn) {
            btn.innerText = "Akses Member Area";
            btn.disabled = false;
            btn.className = "w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3.5 px-4 rounded-xl text-sm transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2";
        }
    </script>
</body>
</html>
