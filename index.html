<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUANG GPTs by Dhe_irwans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            dark: '#030712',
                            panel: '#0b0f19',
                            cyan: '#06b6d4',
                            amber: '#f59e0b',
                            red: '#ef4444',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700;900&family=Share+Tech+Mono&display=swap');
        .font-transformer { font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em; }
        .font-tech { font-family: 'Share Tech Mono', monospace; }
        .cyber-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.02) 1px, transparent 1px);
        }
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
        .mecha-panel { clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px)); }
        .mecha-btn { clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
    </style>
</head>
<body class="bg-cyber-dark text-slate-300 font-sans antialiased cyber-grid">

    <!-- NAVBAR -->
    <nav class="fixed w-full z-40 top-0 bg-cyber-dark/90 backdrop-blur-md border-b border-cyber-cyan/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-center">
            <img src="1000399418.png" alt="Ruang GPTs" class="h-10 md:h-12 object-contain">
        </div>
    </nav>

    <!-- HALAMAN DEPAN ONLY (CLEAN & MINIMALIS) -->
    <main class="min-h-screen pt-24 pb-12 flex flex-col items-center justify-center px-4">
        <div class="w-full max-w-md flex flex-col items-center text-center">
            <img src="1000400317.png" alt="Ruang GPTs 3D" class="w-56 h-56 md:w-72 md:h-72 object-contain mb-6 animate-pulse" style="animation-duration: 4s;">
            
            <div id="loginConsole" class="w-full bg-cyber-panel/80 border border-cyber-cyan/30 p-6 mecha-panel glow-cyan font-tech transition-all duration-300">
                <div class="text-[10px] text-cyber-cyan tracking-widest uppercase mb-4 text-left">// INITIATE_ACCESS_PROTOCOL_</div>
                
                <div class="space-y-4">
                    <input type="email" id="inputEmail" placeholder="masukkan email anda..." 
                           autocapitalize="none" autocorrect="off" spellcheck="false"
                           oninput="handleEmailInput(this)" onfocus="handleInputFocus()"
                           class="w-full bg-cyber-dark border border-slate-800 px-4 py-3.5 text-white focus:outline-none focus:border-cyber-cyan text-sm tracking-wide lowercase placeholder-slate-600">
                    
                    <button onclick="prosesLogin()" id="btnLogin" class="mecha-btn w-full bg-cyber-cyan text-black font-transformer font-black py-3.5 text-xs tracking-widest hover:bg-white transition-all duration-200">
                        ACCESS MEMBER AREA
                    </button>
                    
                    <p id="errorMessage" class="text-xs text-cyber-red font-bold hidden bg-cyber-red/10 py-2 border border-cyber-red/20 uppercase tracking-wider text-center"></p>
                </div>
            </div>
            <p class="font-tech text-[10px] text-slate-600 tracking-widest uppercase mt-6">SECURED_SYSTEM // BY DHE_IRWANS</p>
        </div>
    </main>

    <!-- DATABASE CONFIGURATION SCRIPT -->
    <script>
        // Mengambil whitelist email tetap dari link GitHub Raw kamu
        const EMAIL_DB_URL = "https://raw.githubusercontent.com/adheirwanto/members.json/refs/heads/main/members.json";
        
        // Link Google Docs Materi milikmu
        const GOOGLE_DOCS_URL = "https://docs.google.com/document/d/1hMjTH7fr2Q6uhxh9mPBlWhcECNqajvaa7dgtBUZH3GU/edit?usp=drivesdk";

        function handleEmailInput(element) { element.value = element.value.toLowerCase(); }
        
        function handleInputFocus() {
            setTimeout(() => { document.getElementById('loginConsole').scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }

        async function prosesLogin() {
            const emailInput = document.getElementById('inputEmail').value.trim().toLowerCase();
            const errMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('btnLogin');

            if (!emailInput) return;
            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;
            errMsg.classList.add('hidden');

            try {
                const response = await fetch(EMAIL_DB_URL);
                if (!response.ok) throw new Error();
                const emailBerlisensi = await response.json();
                const cleanEmails = emailBerlisensi.map(email => email.trim().toLowerCase());

                if (Array.isArray(cleanEmails) && cleanEmails.includes(emailInput)) {
                    btn.innerText = "ACCESS GRANTED! REDIRECTING...";
                    btn.className = "mecha-btn w-full bg-emerald-500 text-black font-transformer font-black py-3.5 text-xs tracking-widest";
                    
                    // Eksekusi pemindahan halaman otomatis setelah sukses login
                    setTimeout(() => {
                        window.location.href = GOOGLE_DOCS_URL;
                    }, 800);
                } else {
                    errMsg.innerText = "⚠️ ACCESS DENIED: EMAIL NOT REGISTERED.";
                    errMsg.classList.remove('hidden');
                    handleInputFocus();
                    resetButton(btn);
                }
            } catch (e) {
                errMsg.innerText = "⚠️ SYSTEM ERROR: RECONNECTING TO DATABASE FAILED.";
                errMsg.classList.remove('hidden');
                resetButton(btn);
            }
        }

        function resetButton(btn) {
            btn.innerText = "ACCESS MEMBER AREA";
            btn.disabled = false;
        }
    </script>
</body>
</html>
